<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,"Segoe UI",sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:30px;
        }

        .card{
            width:100%;
            max-width:500px;
            background:#fff;
            padding:35px;
            border-radius:14px;
            box-shadow:0 12px 35px rgba(0,0,0,.08);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            color:#111827;
            font-size:28px;
        }

        form p{
            margin-bottom:20px;
        }

        form label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#374151;
        }

        form input,
        form select,
        form textarea{
            width:100%;
            padding:12px 14px;
            border:1px solid #d1d5db;
            border-radius:8px;
            font-size:15px;
            transition:.25s;
            background:#fff;
        }

        form input:focus,
        form select:focus,
        form textarea:focus{
            outline:none;
            border-color:#111827;
            box-shadow:0 0 0 3px rgba(17,24,39,.08);
        }

        textarea{
            min-height:110px;
            resize:vertical;
        }

        input[type="submit"]{
            width:100%;
            background:#111827;
            color:#fff;
            border:none;
            padding:14px;
            border-radius:8px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:.2s;
            margin-top:10px;
        }

        input[type="submit"]:hover{
            background:#000;
        }

        /* Django Errors */
        .errorlist{
            list-style:none;
            margin:8px 0;
            padding:10px 14px;
            background:#fef2f2;
            border-left:4px solid #dc2626;
            border-radius:6px;
            color:#b91c1c;
            font-size:14px;
        }

        .helptext{
            display:block;
            margin-top:6px;
            color:#6b7280;
            font-size:13px;
        }

        /* Highlight invalid fields */
        input:invalid,
        select:invalid,
        textarea:invalid{
            border-color:#dc2626;
        }

        .button,
input[type="submit"]{
    display:block;
    width:100%;
    background:#111827;
    color:#fff;
    border:none;
    padding:14px;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
    text-align:center;
    text-decoration:none;
    cursor:pointer;
    transition:.2s;
    margin-top:12px;
}

.button:hover,
input[type="submit"]:hover{
    background:#000;
}

.auth-link{
    text-align:center;
    margin-top:18px;
    color:#6b7280;
    font-size:14px;
}

.auth-link a{
    color:#111827;
    font-weight:600;
    text-decoration:none;
}

.auth-link a:hover{
    text-decoration:underline;
}
    </style>
</head>
<body>

<div class="card">
    <h2>Login Form</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <input class="button" type="submit" value="Login">

         <div class="auth-link">
            Don't have an account?
            <a href="{% url 'sign' %}">Create one</a>
        </div>
        
</div>

</body>
</html>
