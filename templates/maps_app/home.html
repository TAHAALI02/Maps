    const lat = {{ data.latitude }};

// Create the map
    const map = L.map('map').setView([lat, lng], zoom);


    const isAuthenticated = {{ user.is_authenticated|yesno:"true,false" }};

    map.on("click", function(e) {

    if (!isAuthenticated) {
        window.location.href = "{% url 'login' %}";
        return;
    }

    // If the user has activated "Add Marker" mode, place a marker here
    if (addMarkerMode) {
        createMarker(e.latlng);

        // reset tool state after placing
        addMarkerMode = false;
        markerTool.innerHTML = "📍 Add Marker";
        markerTool.style.background = "";
    }
});
function createMarker(latlng) {

    const marker = L.marker(latlng, {
        icon: myIcon,
        draggable: true
    }).addTo(userMarkers);

    marker.bindPopup("Loading location...").openPopup();

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`)
        .then(res => res.json())
        .then(data => {
            const place =
                data.address.city ||
                data.address.town ||
                data.address.village ||
                data.address.state ||
                "Unknown location";
            marker.bindPopup(place).openPopup();
        });

    marker.on("dragend", function () {
        const pos = marker.getLatLng();
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`)
            .then(res => res.json())
            .then(data => {
                const place =
                    data.address.city ||
                    data.address.town ||
                    data.address.village ||
                    data.address.state ||
                    "Unknown location";
                marker.bindPopup(place).openPopup();
            });
    });

    marker.on("contextmenu", function () {
        if (confirm("Delete this marker?")) {
            userMarkers.removeLayer(marker);
        }
    });
}

let addMarkerMode = false;

const markerTool = document.getElementById("markerTool");

markerTool.addEventListener("click", function () {

        return;
    }

    addMarkerMode = true;

    markerTool.innerHTML = "Click on map...";
    markerTool.style.background = "green";
});

let userMarkers = L.layerGroup().addTo(map);

function createMarker(latlng) {

    const marker = L.marker(latlng, {
        icon: myIcon,
        draggable: true
    }).addTo(userMarkers);

    marker.bindPopup("New Marker").openPopup();

    marker.on("dragend", function () {

        const pos = marker.getLatLng();

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`)
        .then(res => res.json())
        .then(data => {

            const place =
                data.address.city ||
                data.address.town ||
                data.address.village ||
                data.address.state ||
                "Unknown location";

            marker.bindPopup(place).openPopup();
        });

    });

    marker.on("contextmenu", function () {

        if (confirm("Delete this marker?")) {
            userMarkers.removeLayer(marker);
        }

    });

}
